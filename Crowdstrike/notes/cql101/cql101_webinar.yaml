  note-1779219069439-3:
    x: 6
    y: 0
    height: 4
    text: "**Wildcards** allow you to search for partial matches in text.\n\nYou can\
      \ use the **wildcard()** function in order to search, but a much more common\
      \ approach is to use short hand expressions to invoke the function.\n\nFor instance,\
      \ searching for **user.email=john\\*** will return all events where the **user.email**\
      \ field begins with the string **john**. Searching for **user.email=\\*example.co**\
      \ will return all events where **user.email** ends with **example.co**. \n\n\
      To open the query in Advanced Event Search, Click the **three vertical dots\
      \ ⋮** on the top right of the **Wildcard Examples** widget and select **Edit\
      \ in search view**\n\n[wildcard() function documentation](https://library.humio.com/data-analysis/functions-wildcard.html)\n\
      \        "
    width: 6
    title: Wildcard Notes
    type: note
