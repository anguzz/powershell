      // Don't change anything before this line!

      /* To use a lookup file to enrich events, use the match() function */
      // | match(file="cql101.csv", field=[source.address], column=[host])

      /*
        Note that the previous query filtered events that don't match
        Use the "strict" parameter to control this behavior
