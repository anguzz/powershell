  note-1779301957568-0:
    x: 6
    y: 0
    height: 4
    text: "The **eval()** function is one of the most commonly used functions in CQL.\
      \ Often used with the shorthand **:=** operator, it allows you to assign values\
      \ to fields with a number of operations and functions.\n\n```\nfield:=value\n\
      ``` \nis equivalent to \n```\neval(field=value)\n```\n\nBe careful! \n```\n\
      myField:=value\n``` \nwill look for a field named **value** and put the contents\
      \ into **myField**. \nThis is very different to \n```\nmyField:=\"value\"\n\
      ```\nwhich assigns the string **value** to myField.\n\nTo open the query in\
      \ Advanced Event Search, Click the **three vertical dots ⋮** on the top right\
      \ of the **Eval Examples** widget and select **Edit in search view**\n\n[eval()\
      \ function documentation](https://library.humio.com/data-analysis/functions-eval.html)\n\
      \        "
    width: 6
    title: Eval Notes
    type: note
