      // | match(file="cql101.csv", field=[source.address], column=[host], strict=false)

      /* To only include certain fields from the lookup use the "include" parameter */
      // | match(file="cql101.csv", field=[source.address], column=host, include=[zone])

      /* To use glob matching use the "mode" parameter" */
      | groupBy([user.email, source.address, event.action])
      | match(file="cql101.csv", field=[source.address], column=host, mode=glob, strict=false)
    end: now
