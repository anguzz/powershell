  note-1779302533607-3:
    x: 6
    y: 0
    height: 4
    text: "To open the query in Advanced Event Search, Click the **three vertical\
      \ dots ⋮** on the top right of the **Regex Examples** widget and select **Edit\
      \ in search view**\n\nEvery query language has some important functions that\
      \ are used constantly, and **groupBy()** is one of those functions for CQL.\
      \ It is very simple to use, but can do wonderfully complex grouping and calculations\
      \ depending on what you need.\n\nChoose which fields to group on using the **field**\
      \ parameter. Since it requires an array of fields, it can group on up to 20,000\
      \ fields! \n\nBe default, the function returns a count of every time a field-value\
      \ combination has appeared in the events and puts that into a field called **_count**.\
      \ This can be changed by using the **function** parameter. Any aggregate function\
      \ can be used, even another **groupBy()**! This is very advanced and won't be\
      \ covered in the webinar, but feel free to play with it.\n\n[groupBy() function\
      \ documentation](https://library.humio.com/data-analysis/functions-groupby.html)\n\
      \        "
    width: 6
    title: GroupBy Notes
    type: note
  note-1779302557612-5:
    x: 6
    y: 0
    height: 4
    text: "\n\nTo open the query in Advanced Event Search, Click the **three vertical\
      \ dots ⋮** on the top right of the **Regex Examples** widget and select **Edit\
      \ in search view**\n\nThe **top()** function combines **groupBy()** and **sort()**\
      \ all in one more efficient function. Side by side, **top()** will outperform\
      \ the two function calls in most cases.\n\nIt also allows you to perform other\
      \ options, such as using the **percent** parameter to show the percentage of\
      \ the total count for each entry, and the **other** parameter to put all other\
      \ values that aren't included in the output into their own row.\n\nIf you need\
      \ any functions other than **count()** or **sum()** in your **groupBy()**, you\
      \ will need to use **groupBy()** and **sort()** instead of **top()**. Keep on\
      \ the lookout for when to make your queries more efficient using **top()**,\
      \ but don't fret if you can't. It is more important that the query works than\
      \ to be slightly more efficient!\n\n[top() function documentation](https://library.humio.com/data-analysis/functions-top.html)\n\
      \        "
    width: 6
    title: Top Notes
    type: note
  note-1779302381605-1:
    x: 6
    y: 0
    height: 5
    text: "The **in()** function allows you to match events that have one of several\
      \ values for a field.\n\n```\nevent.action=\"login\" OR event.action=\"logout\"\
      \n``` \nis equivalent to \n```\nin(field=event.action, values=[\"login\", \"\
      logout])\n```\n\nYou can use wildcards for the values \n```\nin(field=user.email,\
      \ values=[\"john\\*\", \"\\*@example.co\"])\n```\n\nExclude values by putting\
      \ **!** before the in function \n```\n!in(field=source.address, values=[\"HOST-01\"\
      , \"HOST-02\"])\n``` \nwill exclude events with a source.address value of HOST-01\
      \ or HOST-02.\n\nTo open the query in Advanced Event Search, Click the **three\
      \ vertical dots ⋮** on the top right of the **In Examples** widget and select\
      \ **Edit in search view**\n\n[in() function documentation](https://library.humio.com/data-analysis/functions-in.html)\n\
      \        "
    width: 6
    title: In Notes
    type: note
  note-1779302565607-6:
    x: 6
    y: 0
    height: 6
    text: "To open the query in Advanced Event Search, Click the **three vertical\
      \ dots ⋮** on the top right of the **Regex Examples** widget and select **Edit\
      \ in search view**\n\nThe **match()** function allows you to take information\
      \ in a lookup file (or [ad-hoc table](https://library.humio.com/data-analysis/query-joins-methods-adhoc-tables.html))\
      \ to enrich data from a search. \n\nYou use the **field** argument to select\
      \ which field should match up to the **column** parameter in the lookup file.\
      \ Select which fields from the lookup to enrich the data with the **include**\
      \ parameter. \n\nThe function also allows for glob and CIDR matching with the\
      \ **mode** argument. This has a bunch of uses, but one of my favorites is to\
      \ set default values using glob, such as with the example to the left! Instead\
      \ of putting in a severity for every HOST machine, the lookup file has **HOST\\\
      *** to give a value to every machine. Be careful, glob matches take priority\
      \ over exact matches! If HOST-03 was high priority, we would need to change\
      \ the lookup with every HOST machine in order to not present false data.\n\n\
      By default the function removes rows that do not have matching columns in the\
      \ lookup file. If you do not want to filter - you wish to perform a left join\
      \ in other parlance - set the **strict** parameter to true.\n\n[match() function\
      \ documentation](https://library.humio.com/data-analysis/functions-match.html)\n\
      \        "
    width: 6
    title: Match notes
    type: note
  note-1779302549607-4:
    x: 6
    y: 0
    height: 4
    text: "To open the query in Advanced Event Search, Click the **three vertical\
      \ dots ⋮** on the top right of the **Regex Examples** widget and select **Edit\
      \ in search view**\n\nThe **sort()** function does exactly as it says, it sorts!\
      \ Give it a field or multiple fields, and it will sort the output by those fields\
      \ in the order you specify them. You can choose to **order** the sort in either\
      \ an **ascending** or **descending** manner. You can also choose the **type**\
      \ of data being sorted, so numbers will sort as numbers and strings will be\
      \ sorted lexicographically.\n\n```\nsort([_count, user.email, event.action],\
      \ type=[number, string, string], order=[desc, asc, asc])\n```\n\nThe function\
      \ above sorts by _count first, then user.name, and finally event.action. We\
      \ specify _count is a number, while user.name and event.action are strings.\
      \ Finally we sort in a descending manner (Z-A, 9-0) on _count, then ascending\
      \ (A-Z 0-9) for user.name and event.action.\n\n[sort() function documentation](https://library.humio.com/data-analysis/functions-sort.html)\n\
      \        "
    width: 6
    title: Sort Notes
    type: note
  note-1779216825437-1:
    x: 6
    y: 0
    height: 6
    text: |
      Welcome! This dashboard is meant to accompany the **CQL 101** webinar. Use the queries provided in these widgets in order to follow along during the class.

      This is your personal copy, so you are encouraged to modify the queries and widgets in order to practice CQL!

      ### The Dataset
      This is an example dataset showing logins and logouts to servers. It includes the user's email, the machine that the action was performed on, the action, and the outcome. These are all normalized to CPS. Feel free to add to these fields and challenge yourself to use the appropriate CPS fields!

      ### Event Creation Query
      The query to the left utilizes the **createEvents()** function and the **kvParse()** function. This allows all of us to work from the same set of events, even if there is no event data ingested to Next-Gen SIEM!

      This query will be the beginning of all of the other queries in the dashboard. If you're interested in understanding how the two functions in the query work, follow the documentation links below.

      [createEvents() function documentation](https://library.humio.com/data-analysis/functions-createevents.html)

      [kvParse() function documentation](https://library.humio.com/data-analysis/functions-kvparse.html)
    width: 6
    title: Introduction
    type: note
  ba6ac803-5123-417f-9980-27a147391e94:
    x: 0
    y: 0
    height: 4
