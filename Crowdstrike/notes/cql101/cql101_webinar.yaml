  note-1779223112317-1:
    x: 6
    y: 0
    height: 4
    text: "**Regular expression** or **regex** is a powerful tool for filtering and\
      \ extracting data. \n\nIf you are familiar with regex elsewhere, much of the\
      \ knowledge should transfer over. Refer to the [Differences from Other Regex\
      \ Implementations](https://library.humio.com/data-analysis/syntax-regex-diffs.html)\
      \ page for how Next-Gen SIEM's regex differs from styles you may be familiar\
      \ with.\n\nYou can use the **regex()** function in order to use regex, such\
      \ as when you do not want to filter out non-matches by using the **strict=false**\
      \ parameter. You can also use regex with **field=/$REGEX/** syntax.\n\nTo open\
      \ the query in Advanced Event Search, Click the **three vertical dots ⋮** on\
      \ the top right of the **Regex Examples** widget and select **Edit in search\
      \ view**\n\n[regex() function documentation](https://library.humio.com/data-analysis/functions-regex.html)\n\
      \        "
    width: 6
    title: Regex Notes
    type: note
  64eb2c07-00e2-44e2-b482-bf0cc80a8d42:
    x: 0
    y: 0
    height: 4
    queryString: |-
      // Use the createEvents() function to create events
      createEvents(["user.email=john@example.co,event.action=login,event.outcome=failure,source.address=VULN-01","user.email=john@example.co,event.action=login,event.outcome=failure,source.address=VULN-02","user.email=john@example.co,event.action=login,event.outcome=failure,source.address=VULN-03","user.email=john@example.co,event.action=login,event.outcome=failure,source.address=VULN-04","user.email=john@example.co,event.action=login,event.outcome=success,source.address=VULN-05","user.email=alex@example.co,event.action=login,event.outcome=success,source.address=HOST-01","user.email=alex@example.co,event.action=logout,event.outcome=success,source.address=HOST-01","user.email=alex@example.co,event.action=login,event.outcome=success,source.address=HOST-02","user.email=alex@example.co,event.action=logout,event.outcome=success,source.address=HOST-02","user.email=carla@example.co,event.action=login,event.outcome=failure,source.address=HOST-02","user.email=carla@example.co,event.action=login,event.outcome=failure,source.address=HOST-02","user.email=carla@example.co,event.action=login,event.outcome=failure,source.address=HOST-02","user.email=hax0r@scattered.spider,event.action=login,event.outcome=failure,source.address=TOP-SECRET-01","user.email=hax0r@scattered.spider,event.action=login,event.outcome=success,source.address=TOP-SECRET-01"]) | kvParse()
      // Don't change anything before this line!

      /* These two statements are equivalent! */
      | @field := "Use := for eval!"
      // | eval(@field="Use := for eval!")

      /* Notice the following doesn't work, as it is looking for a field named "value" */
      // | field := value

      /* When using the values inside fields don't use quotes */
      // | outcome := event.outcome
      // | address := source.address

      /* The field is assigned the result of the right side of the eval */
      // | result := 5 + 7

      /* This includes functions! */
      // | result := format(format="%s %s", field=[event.action, event.outcome])
      // | address := lower(source.address)
    end: now
