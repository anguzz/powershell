  note-1779302438605-2:
    x: 6
    y: 0
    height: 5
    text: "**Case statements** allow for conditional execution of CQL. They are similar\
      \ to **switch/case** statements in other languages, combined with more traditional\
      \ **if/else if/else** statements.\n\n```\n| case {\n    condition1 | outcome1;\n\
      \    condition2 | outcome2;\n    * | catchall-outcome;\n}\n```\n\nOnly one condition\
      \ within the case statement will be executed. They are evaluated top to bottom,\
      \ so the first statement that evaluates to true is what gets executed.\n\nTo\
      \ open the query in Advanced Event Search, Click the **three vertical dots ⋮\
      ** on the top right of the **Regex Examples** widget and select **Edit in search\
      \ view**\n\n[Case statement examples](https://library.humio.com/data-analysis/syntax-conditional.html#syntax-conditional-case-example)\n\
      \        "
    width: 6
    title: Case Statement Notes
    type: note
